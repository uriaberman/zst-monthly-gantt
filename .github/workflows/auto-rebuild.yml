name: Auto-rebuild gantts on data change

# Triggers whenever the Publish button (via GitHub API) updates any data.json,
# or when build.py / registry / shared assets change. Runs build_all.py
# to regenerate HTMLs and commits them back. Pages auto-redeploys after the commit.

on:
  push:
    paths:
      - 'pilots/**/data.json'
      - 'pilots/registry.json'
      - 'build.py'
      - 'parser.py'
      - 'smart_placement.py'
      - 'israeli_holidays.py'
      - 'assets/**'
  workflow_dispatch:
    inputs:
      scope:
        description: 'all | <slug>'
        required: false
        default: 'all'

# Allow this workflow to push commits back to the repo
permissions:
  contents: write

# Avoid duplicate rebuilds if multiple pushes land quickly
concurrency:
  group: auto-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    # Skip if the commit message contains the marker (prevents recursion)
    if: "!contains(github.event.head_commit.message, '[skip rebuild]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to diff changed files

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyluach python-docx pdfplumber

      - name: Detect changed pilots
        id: changes
        run: |
          # Manual dispatch → always rebuild all (simpler + safer)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "scope=all" >> $GITHUB_OUTPUT
            echo "Manual dispatch → rebuild all"
            exit 0
          fi
          # Find changed data.json files in this push; default to "all" if other shared files changed
          shared_changed=$(git diff --name-only HEAD^ HEAD | grep -E '^(build\.py|parser\.py|smart_placement\.py|israeli_holidays\.py|pilots/registry\.json|assets/)' || true)
          data_changed=$(git diff --name-only HEAD^ HEAD | grep -E '^pilots/[^/]+/data\.json$' || true)
          if [ -n "$shared_changed" ]; then
            echo "scope=all" >> $GITHUB_OUTPUT
            echo "Shared files changed → rebuild all targets"
          elif [ -n "$data_changed" ]; then
            echo "scope=changed" >> $GITHUB_OUTPUT
            files=$(echo "$data_changed" | tr '\n' ' ')
            echo "files=$files" >> $GITHUB_OUTPUT
            echo "Data changed: $files"
          else
            echo "scope=none" >> $GITHUB_OUTPUT
            echo "No build-affecting changes"
          fi

      - name: Rebuild all (shared change)
        if: steps.changes.outputs.scope == 'all'
        run: python build_all.py

      - name: Rebuild affected only (data change)
        if: steps.changes.outputs.scope == 'changed'
        run: python build_all.py --changed ${{ steps.changes.outputs.files }}

      - name: Commit + push rebuild
        if: steps.changes.outputs.scope != 'none'
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/
          if ! git diff --cached --quiet; then
            git commit -m "auto-rebuild: HTMLs regenerated by Action [skip rebuild]"
            git push
          else
            echo "No HTML changes after rebuild"
          fi
